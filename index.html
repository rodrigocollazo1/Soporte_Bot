<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoporteBot</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="contenedor">
    <!-- Chat principal -->
     <div class="chat-y-footer">
      <div class="chat">
      <div class="chat-header">
        <div class="chat-header-info">
          <div class="avatar">🤖</div>
          <div>
            <h2>SoporteBot</h2>
            <p>● En línea</p>
          </div>
        </div>
        <button id="reset-btn">↺ Reiniciar</button>
      </div>

      <div id="mensajes"></div>

      <div id="quick-replies"></div>

      <div class="chat-footer">
        <input id="user-input" type="text" placeholder="Escribí un mensaje..." autocomplete="off" />
        <button id="send-btn">➤</button>
      </div>
    </div>
      <footer class="app-footer">
        <h3>© Collazo Rodrigo - Daian Horst 2026 | Organización Empresarial - UTN</h3>  
      </footer>
     </div>
  </div>

  <!-- Primero la lógica, luego la interfaz -->
  <script src="js/bot.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
